<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>йҺҙжҲ ж®‘й‘ҝж»ғеҙҹ - з»үдҪ·жұүй‘ҝж»Ҷж°Ёз» вҖіоҶҚ</title>
<style>
:root{--p:#2E7D32;--pl:#4CAF50;--pd:#1B5E20;--ac:#FF8F00;--bg:#FAFAFA;--card:#FFF;--tx:#212121;--ts:#757575;--bd:#E0E0E0;--sh:0 2px 8px rgba(0,0,0,.08);--r:12px;--dn:#D32F2F;--tg:#E8F5E9;--tt:#2E7D32}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;-webkit-tap-highlight-color:transparent;padding-bottom:80px}
.auth-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,var(--p),var(--pl))}
.auth-box{background:var(--card);border-radius:20px;padding:32px 24px;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.auth-box h1{font-size:24px;text-align:center;margin-bottom:4px}
.auth-box .sub{text-align:center;color:var(--ts);font-size:13px;margin-bottom:24px}
.auth-box .logo{text-align:center;font-size:48px;margin-bottom:8px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:13px;font-weight:600;color:var(--ts);margin-bottom:6px}
.fg input,.fg select{width:100%;padding:10px 12px;border:1px solid var(--bd);border-radius:8px;font-size:14px;outline:none;font-family:inherit;background:var(--bg);transition:border .2s}
.fg input:focus,.fg select:focus{border-color:var(--p)}
.fg textarea{width:100%;padding:10px 12px;border:1px solid var(--bd);border-radius:8px;font-size:14px;outline:none;font-family:inherit;background:var(--bg);resize:vertical;min-height:70px}
.btn{width:100%;padding:12px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn:active{opacity:.8}
.btn-p{background:var(--p);color:#fff}
.btn-ac{background:var(--ac);color:#fff}
.btn-s{background:var(--bg);color:var(--ts);border:1px solid var(--bd);width:auto;padding:12px 20px}
.btn-d{background:var(--dn);color:#fff}
.btn-w{background:#FFF3E0;color:#E65100}
.btn-row{display:flex;gap:10px;margin-top:16px}
.btn-row .btn{flex:1}
.auth-error{background:#FFEBEE;color:var(--dn);padding:8px 12px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none}
.header{background:linear-gradient(135deg,var(--p),var(--pl));color:#fff;padding:16px 16px 12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(46,125,50,.3)}
.header h1{font-size:20px;font-weight:700}
.header .sub{font-size:12px;opacity:.85;margin-top:2px}
.search-bar{margin-top:10px;position:relative}
.search-bar input{width:100%;padding:9px 14px 9px 36px;border:none;border-radius:24px;font-size:14px;background:rgba(255,255,255,.95);color:var(--tx);outline:none}
.search-bar::before{content:'\1F50D';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;opacity:.5}
.tabs{display:flex;overflow-x:auto;gap:6px;padding:10px 16px;background:var(--card);border-bottom:1px solid var(--bd);-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:5px 14px;border-radius:18px;font-size:12px;white-space:nowrap;cursor:pointer;transition:all .2s;background:var(--bg);color:var(--ts);border:1px solid var(--bd)}
.tab.on{background:var(--p);color:#fff;border-color:var(--p)}
.qa{display:flex;gap:8px;padding:10px 16px}
.qa-btn{flex:1;padding:10px 6px;border:none;border-radius:var(--r);cursor:pointer;font-size:12px;font-weight:600;color:#fff;transition:transform .15s}
.qa-btn:active{transform:scale(.95)}
.qa-btn .ic{font-size:18px;display:block;margin-bottom:2px}
.qa-btn.rnd{background:linear-gradient(135deg,#FF8F00,#FFB300)}
.qa-btn.add{background:linear-gradient(135deg,var(--p),var(--pl))}
.qa-btn.grp{background:linear-gradient(135deg,#5C6BC0,#7986CB)}
.qa-btn.adm{background:linear-gradient(135deg,#7B1FA2,#AB47BC)}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:0 16px 10px}
.st{background:var(--card);border-radius:var(--r);padding:12px;box-shadow:var(--sh);text-align:center}
.st .n{font-size:24px;font-weight:700;color:var(--p)}
.st .l{font-size:11px;color:var(--ts);margin-top:2px}
.sec-t{font-size:14px;font-weight:700;padding:10px 16px 6px;color:var(--tx)}
.rg{padding:4px 16px;display:flex;flex-direction:column;gap:8px}
.rc{background:var(--card);border-radius:var(--r);padding:12px;box-shadow:var(--sh);cursor:pointer;transition:transform .15s;position:relative}
.rc:active{transform:scale(.98)}
.rc .top{display:flex;justify-content:space-between;align-items:flex-start}
.rc .name{font-size:15px;font-weight:600;flex:1;margin-right:8px}
.rc .fav{font-size:16px;cursor:pointer;line-height:1}
.rc .tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.tag{font-size:10px;padding:2px 7px;border-radius:8px;background:var(--tg);color:var(--tt)}
.tag.d1{background:#E8F5E9;color:#2E7D32}
.tag.d2{background:#FFF3E0;color:#E65100}
.tag.d3{background:#FFEBEE;color:#C62828}
.tag.role-admin{background:#F3E5F5;color:#7B1FA2}
.tag.role-editor{background:#E3F2FD;color:#1565C0}
.tag.role-viewer{background:#FFF3E0;color:#E65100}
.rc .meta{font-size:11px;color:var(--ts);margin-top:5px;display:flex;gap:10px}
.rc .author{font-size:10px;color:var(--ts);margin-top:4px}
.empty{text-align:center;padding:48px 20px;color:var(--ts)}

.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
.mo.show{display:flex}
.md{background:var(--card);width:100%;max-width:500px;max-height:90vh;overflow-y:auto;border-radius:20px 20px 0 0;padding:20px;animation:su .3s ease}

.md-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.md-h h2{font-size:17px;font-weight:700}
.md-c{width:30px;height:30px;border:none;border-radius:50%;background:var(--bg);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.ti-wrap{display:flex;gap:6px;flex-wrap:wrap;padding:6px;border:1px solid var(--bd);border-radius:8px;min-height:40px;background:var(--bg);cursor:text}

.ti-chip{display:flex;align-items:center;gap:3px;background:var(--tg);color:var(--tt);padding:3px 7px;border-radius:10px;font-size:11px}

.ti-wrap input{border:none;outline:none;flex:1;min-width:50px;font-size:12px;background:transparent;padding:3px}
.dt-name{font-size:20px;font-weight:700}
.dt-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.dt-sec{margin-bottom:14px}
.dt-sec h3{font-size:13px;font-weight:700;color:var(--p);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.dt-sec p,.dt-sec li{font-size:13px;line-height:1.7}
.dt-sec ul{padding-left:18px}
.dt-sec .ing-list{list-style:none;padding:0}
.dt-sec .ing-list li{padding:5px 0;border-bottom:1px dashed var(--bd);display:flex;justify-content:space-between}
.dt-sec .ing-list li:last-child{border-bottom:none}
.rnd-res{text-align:center;padding:16px 0}
.rnd-res .ic{font-size:48px;margin-bottom:10px}
.rnd-res .nm{font-size:22px;font-weight:700;color:var(--p)}
.rnd-res .sb{font-size:13px;color:var(--ts);margin-top:4px}
.grp-card{background:var(--card);border-radius:var(--r);padding:16px;box-shadow:var(--sh);margin:10px 16px}
.grp-card h3{font-size:16px;font-weight:700;margin-bottom:8px}
.grp-card .code{font-size:24px;font-weight:700;color:var(--ac);letter-spacing:3px;text-align:center;padding:10px;background:var(--bg);border-radius:8px;margin:8px 0}
.grp-card .members{margin-top:10px}
.grp-card .mb{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd);font-size:13px}
.grp-card .mb:last-child{border-bottom:none}
.grp-card .mb .av{width:28px;height:28px;border-radius:50%;background:var(--pl);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
.wp .dr{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--bd)}
.wp .dr:last-child{border-bottom:none}
.wp .dl{width:44px;font-size:12px;font-weight:700;color:var(--p);flex-shrink:0}
.wp .dm{flex:1;display:flex;gap:5px}
.wp .ms{flex:1;padding:6px;background:var(--bg);border-radius:6px;font-size:11px;min-height:36px;cursor:pointer;text-align:center;border:1px dashed var(--bd);transition:all .2s}
.wp .ms.on{border-style:solid;background:var(--tg);color:var(--tx);font-weight:500}
.wp .ms .ml{font-size:9px;color:var(--ts);display:block;margin-bottom:1px}
.bn{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--bd);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.ni{flex:1;padding:7px 0;text-align:center;cursor:pointer;transition:color .2s;color:var(--ts);font-size:10px}
.ni.on{color:var(--p)}
.ni .ni-ic{font-size:18px;display:block;margin-bottom:1px}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);background:rgba(0,0,0,.75);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;z-index:999;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.sync{font-size:11px;opacity:.7;margin-top:4px}
/* Admin panel */
.admin-sec{margin-top:12px;padding:12px;background:var(--bg);border-radius:var(--r)}

.user-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bd);font-size:13px}
.user-row:last-child{border-bottom:none}

.user-row .ur-role{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--tg);color:var(--tt)}
.role-select{padding:4px 8px;border-radius:6px;border:1px solid var(--bd);font-size:12px;background:var(--card)}
@media(min-width:600px){.rg{flex-direction:row;flex-wrap:wrap}.rc{width:calc(50% - 4px)}.stats{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>

<!-- AUTH PAGE -->
<div id="authPage" class="auth-page">

<script>
const API = '';
let token = localStorage.getItem('menu_token') || '';
let currentUser = null;
let allRecipes = [];
let allUsers = [];
let currentCat = 'йҚҸг„©е„ҙ';
let curPage = 'list';
let formTags = [];
let weekPlan = {};
const CATS = ['йҚҸг„©е„ҙ','зҖ№и·әзҲ¶й‘ҝ?,'и№ҮоӮЈеўңй‘ҝ?,'е§№гӮҮж’ӯ','йҚ‘еӨҺеҪҚ','ж¶“е©ҡо—Ө','йҗ‘жЁјеү»','зҒҸеҝ“жӮҶ','йҚҸжңөзІ¬'];
const DAYS = ['йҚӣг„Өз«ҙ','йҚӣг„Өз°©','йҚӣг„Өз¬Ғ','йҚӣг„Ҙжҙ“','йҚӣг„Өз°І','йҚӣг„ҘеҸҡ','йҚӣг„ҰжЈ©'];
const MEALS = ['йҸғв•…оҳө','йҚ—е Ҙоҳө','йҸ…ж°¶оҳө'];
const ROLE_NAMES = {admin:'з» пј„жӮҠйҚӣ?,editor:'зјӮж ¬з·«й‘°?,viewer:'йҸҢгғ§ж№…й‘°?};
const ROLE_COLORS = {admin:'role-admin',editor:'role-editor',viewer:'role-viewer'};

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500)}
async function api(method,url,body){
  const h={'Content-Type':'application/json'};
  if(token)h['Authorization']='Bearer '+token;
  const r=await fetch(API+url,{method,headers:h,body:body?JSON.stringify(body):undefined});
  const d=await r.json();
  if(!r.ok)throw new Error(d.error||'з’Үй”Ӣзң°жҫ¶иҫ«и§Ұ');
  return d;
}
function opMo(id){document.getElementById(id).classList.add('show')}
function clMo(id){document.getElementById(id).classList.remove('show')}
document.querySelectorAll('.mo').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('show')}));

// --- Login ---
async function doLogin(){
  const u=document.getElementById('aUser').value.trim();

  }else{
    h+=`<div class="fg"><label>йҸғСғзҳ‘йҗ®?/label><input type="password" id="setOldP" placeholder="ж¶“е¶Ҷж•јзҖөе—ҷзҲңйҗЈж¬‘в”–"></div>
      <div class="fg"><label>йҸӮжқҝзҳ‘йҗ®?/label><input type="password" id="setNewP" placeholder="ж¶“е¶Ҷж•јзҖөе—ҷзҲңйҗЈж¬‘в”–"></div>`;
  }
  h+=`<div class="btn-row"><button class="btn btn-p" onclick="saveSettings()">ж·ҮжҝҶз“Ё</button></div>
    <div class="btn-row" style="margin-top:20px"><button class="btn btn-d" onclick="logout()">й–«вӮ¬йҚ‘иҷ№ж«ҘиӨ°?/button></div>`;
  document.getElementById('settingsContent').innerHTML=h;
  opMo('settingsModal');
}
async function saveSettings(){
  const displayName=document.getElementById('setDisp').value.trim();
  const password=document.getElementById('setNewP').value;
  const isAdmin=currentUser.role==='admin';
  const body={displayName};
  if(isAdmin){
    const username=document.getElementById('setUser').value.trim();
    if(username)body.username=username;
    if(password)body.password=password;
  }else{
    const oldPassword=document.getElementById('setOldP').value;
    if(password&&oldPassword){body.oldPassword=oldPassword;body.password=password}
  }
  try{
    const d=await api('PUT','/api/me',body);
    token=d.token;currentUser=d.user;
    localStorage.setItem('menu_token',token);
    document.getElementById('headerSub').textContent=`${currentUser.displayName}йҗЁеӢ®еҪҚз’Ӣиҫ©о…ёзҖ№зҰ¶;
    clMo('settingsModal');toast('е®ёи№ӯз№ҡзҖӣ?);
  }catch(e){toast(e.message)}
}

// --- Admin Panel ---
async function openAdminPanel(){
  if(currentUser.role!=='admin')return;
  try{allUsers=await api('GET','/api/users')}catch(e){toast(e.message);return}
  renderAdmin();
  opMo('adminModal');
}
function renderAdmin(){
  const nonAdmin=allUsers.filter(u=>u.id!=='admin');
  let h=`<div class="md-h"><h2>йҰғжҶ« з» пј„жӮҠйҚӣж©ҖжҪ°йҸү?/h2><button class="md-c" onclick="clMo('adminModal')">йүҒ?/button></div>`;
  // User list
  h+=`<div class="admin-sec"><h3>йҰғжҮҒ йҗўг„Ұеҹӣз» пј„жӮҠ (${allUsers.length}жөң?</h3>`;
  allUsers.forEach(u=>{
    const rn=ROLE_NAMES[u.role]||'йҺҙж„¬жҶі';
    if(u.id==='admin'){
      h+=`<div class="user-row"><span style="font-size:20px">йҰғжҶ«</span><span class="ur-name">${esc(u.displayName||u.username)}</span><span class="tag role-admin">з» пј„жӮҠйҚӣ?/span></div>`;
    }else{
      h+=`<div class="user-row">
        <span style="font-size:16px">${u.role==='editor'?'йүҒеҝҘз¬Қ':'йҰғжҶ–'}</span>
        <span class="ur-name">${esc(u.displayName||u.username)} <span style="color:var(--ts);font-size:11px">${esc(u.username)}</span></span>
        <select class="role-select" onchange="changeRole('${u.id}',this.value)">
          <option value="editor" ${u.role==='editor'?'selected':''}>зјӮж ¬з·«й‘°?/option>
          <option value="viewer" ${u.role==='viewer'?'selected':''}>йҸҢгғ§ж№…й‘°?/option>
        </select>
        <button class="btn btn-w" style="width:auto;padding:4px 10px;font-size:11px" onclick="resetPwd('${u.id}','${esc(u.username)}')">й–Іе¶Үз–ҶзҖөе—ҷзҲң</button>
        <button class="btn btn-d" style="width:auto;padding:4px 10px;font-size:11px" onclick="delUser('${u.id}','${esc(u.displayName||u.username)}')">йҚ’зҠ»ж«Һ</button>
      </div>`;
    }
  });
  h+=`</div>`;
  // Add user
  h+=`<div class="admin-sec"><h3>йүғ?еЁЈиҜІе§һйҺҙж„¬жҶіз’җп№ҖеҪҝ</h3>
    <div class="fg"><label>йҗўг„ҰеҹӣйҚҡ?/label><input type="text" id="newUser" placeholder="йҗ§иҜІз¶Қйҗўг„ҰеҹӣйҚҡ?></div>
    <div class="fg"><label>зҖөе—ҷзҲң</label><input type="password" id="newPwd" placeholder="й‘·еҶІзҡҜ4жөЈ?></div>
    <div class="fg"><label>йҸ„еү§гҒҡйҚҡе¶ҮРһ</label><input type="text" id="newDisp" placeholder="зҖ№жңөжұүйҺ¬еәқз®һйҚҷоӮ¬зҙө"></div>
    <div class="fg"><label>йҸүеҶ®жӘә</label>
      <select id="newRole"><option value="editor">зјӮж ¬з·«й‘°е’ғзҙҷйҚҷоҲӣеқҠйҚ”?зјӮж ¬з·«й‘ҝж»Ҷж°Ёй”ӣ?/option><option value="viewer">йҸҢгғ§ж№…й‘°е’ғзҙҷйҚҷоҒҮе…ҳйҗӘе¬¶зҙҡ</option></select>
    </div>
    <button class="btn btn-p" onclick="addUser()">йҚ’ж¶ҳзј“з’җп№ҖеҪҝ</button>
  </div>`;
  document.getElementById('adminContent').innerHTML=h;
}
async function changeRole(uid,role){
  try{await api('PUT',`/api/users/${uid}`,{role});allUsers=await api('GET','/api/users');renderAdmin();toast('йҸүеҶ®жӘәе®ёеҸүжҙҝйҸӮ?)}catch(e){toast(e.message)}
}
async function resetPwd(uid,uname){
  const np=prompt(`й–Іе¶Үз–Ҷ ${uname} йҗЁеӢ«зҳ‘йҗ®дҫҠзҙ°`);
  if(!np)return;
  try{await api('PUT',`/api/users/${uid}`,{password:np});toast('зҖөе—ҷзҲңе®ёжҹҘеҷёзјғ?)}catch(e){toast(e.message)}
}
async function delUser(uid,uname){
  if(!confirm(`зәӯоҶјз•ҫйҚ’зҠ»ж«Һйҗўг„Ұеҹӣ ${uname}й”ӣз„Ӣ))return;
  try{await api('DELETE',`/api/users/${uid}`);allUsers=await api('GET','/api/users');await loadRecipes();renderAdmin();toast('е®ёжҸ’еһ№й—„?)}catch(e){toast(e.message)}
}
async function addUser(){
  const username=document.getElementById('newUser').value.trim();
  const password=document.getElementById('newPwd').value;
  const displayName=document.getElementById('newDisp').value.trim();
  const role=document.getElementById('newRole').value;
  if(!username||!password){toast('з’Үз–Ҝз·ӯйҚҸгғ§ж•ӨйҺҙеі°жӮ•йҚңеұҪзҳ‘йҗ®?);return}
  try{
    await api('POST','/api/users',{username,password,displayName:displayName||username,role});
    allUsers=await api('GET','/api/users');
    renderAdmin();toast('йҺҙж„¬жҶіз’җп№ҖеҪҝе®ёжҸ’еһұеҜӨ?);
  }catch(e){toast(e.message)}
}

// --- Page Switch ---
function swPage(p){
  curPage=p;
  document.querySelectorAll('.ni').forEach(n=>{
    n.classList.toggle('on',n.dataset.page===p);
  });
  if(p==='grp')openGroup();
  else if(p==='plan')openPlanM();
  else if(p==='set')openSettings();
  else if(p==='admin')openAdminPanel();
  else renderList();
}

if(token)checkAuth();
